<!doctype html>
<html>
  <head>
    <title>Isomap</title>
    <link rel="stylesheet" href="static/css/styles.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.9.0/d3.min.js"></script>
    <script src="https://cdn.plot.ly/plotly-2.24.1.min.js"></script>
    <script src="static/js/index.js"></script>
  </head>
  <body>
    <div class="container">
        <div class="controls">
            <label for="dataset">Dataset</label>
            <select id="dataset">
                <option value="swiss_roll">swiss_roll</option>
                <option value="s_curve">s_curve</option>
                <option value="digits">digits</option>
            </select>

            <label for="mode">Neighborhood graph mode</label>
            <select id="mode">
                <option value="k-nearest-neighbor">k-nearest-neighbor</option>
                <option value="r-ball">r-ball</option>
            </select>

            <label id="label-for-param">K</label>
            <div class="param-row">
                <input id="param-num" type="number" value="15">
                <input id="param" type="range" min="3" max="50" step="1" value="15">
            </div>
            
            </div>

        <div class="viz-container">
            <div class="plot-wrapper">
                <div id="plot-3d"></div>
            </div>
            <div class="plot-wrapper">
                <svg id="main" width="500" height="400"></svg>
            </div>
        </div>
    </div>
</body>
</html>
